name: Run Tests

on:
  workflow_dispatch:
    inputs:
      os:
        type: choice
        options:
          - windows
          - ubuntu
        required: true
      format:
        description: 'The format to download. Options: "archive" (default) or "appimage" (Linux only).'
        type: choice
        options:
          - archive
          - appimage
        required: false
        default: 'archive'

jobs:
  test:
    name: Tests - ${{ matrix.config.os }}
    runs-on: ${{ matrix.config.os }}
    permissions:
      checks: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        config:
          - os: ${{ github.event.inputs.os == 'windows' && 'windows-latest' || 'ubuntu-24.04' }}

    steps:
    - name: Set Initial Workflow Status
      shell: bash
      run: |
        echo "WORKFLOW_STATUS=success" >> $GITHUB_ENV

    - name: Create User Data Directories
      if: ${{ inputs.format == 'appimage' }}
      shell: bash
      run: |
        # We have to create these before running the tests, otherwise the directory watchers will not catch changes properly
        mkdir -p $HOME/.local/share/pfm/lua
        mkdir -p $HOME/.local/share/pfm/scripts/localization/en

    - name: Run Tests
      uses: Silverlan/pragma/github_actions/run_common_tests@main
      timeout-minutes: 60
      with:
        import-tests-token: ${{ secrets.PRAGMA_TESTS_IMPORT_TOKEN }}
        format: ${{ inputs.format }}

    - name: Set Failure Workflow Status
      if: failure()
      shell: bash
      run: |
        echo "WORKFLOW_STATUS=failure" >> $GITHUB_ENV
      
    - uses: LouisBrunner/checks-action@v2.0.0
      if: always()
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        conclusion: ${{ env.WORKFLOW_STATUS }}
        name: "Tests - ${{ matrix.config.os }}"
        output: |
          {"summary":"Test result is '${{ env.WORKFLOW_STATUS }}'. See \"Run Tests\" action for details."}
