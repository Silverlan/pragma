name: Run Pragma Lua Script
description: 'Run a Pragma Lua-script.'
inputs:
  working-directory:
    description: 'The location where Pragma resides. If no Pragma installation is found, it will be installed in this location.'
    required: true
    default: 'pragma'
  user-directory:
    description: 'Where user-files and Pragma-generated files should reside. Defaults to $HOME/.local/share/pfm for appimages, otherwise working-directory.'
    required: false
    default: ''
  lua-code:
    description: 'Lua code to execute'
    required: true
    default: ''
  lua-script:
    description: 'Lua script file to execute'
    required: true
    default: ''
  state:
    description: 'Set to "client" for client-side execution, otherwise "server".'
    required: true
    default: 'client'
  version:
    description: 'The version of Pragma to download (if it not already exists).'
    required: true
    default: 'nightly'
  format:
    description: 'The format to use. Options: "archive" (default) or "appimage" (Linux only).'
    required: false
    default: 'archive'
  artifacts-name:
    description: 'If specified, debug files (e.g. logs) will be uploaded as artifacts under this name.'
    required: true
    default: ''
outputs:
  exit-code:
    description: 'The exit code raised by Pragma.'
    value: ${{ steps.handle-result.outputs.exit-code }}
  error:
    description: 'Describes the type of error that has occurred, or "success" if no error occurred.'
    value: ${{ steps.handle-result.outputs.error }}
  lua-error:
    description: 'The Lua error that was caused by running the Lua-code, if there was one.'
    value: ${{ steps.handle-result.outputs.lua-error }}
runs:
  using: "composite"
  steps:
    - name: Resolve directory paths
      shell: bash
      run: |
        RAW_WORK="${{ inputs.working-directory }}"
        echo "WORKING_DIR=${RAW_WORK//\\//}" >> $GITHUB_ENV
        
        if [ -n "${{ inputs.user-directory }}" ]; then
          RAW_USER="${{ inputs.user-directory }}"
        elif [ "${{ inputs.format }}" == "appimage" ]; then
          RAW_USER="$HOME/.local/share/pfm"
        else
          RAW_USER="${{ inputs.working-directory }}"
        fi
        echo "USER_DIR=${RAW_USER//\\//}" >> $GITHUB_ENV

    - name: Download Pragma
      id: download-pragma
      uses: Silverlan/pragma/github_actions/download_pragma@main
      with:
        version: "${{ inputs.version }}"
        working-directory: "${{ inputs.working-directory }}"
        format: "${{ inputs.format }}"

    - name: Generate CI Lua-script
      shell: bash
      run: |
        mkdir -p "$USER_DIR/lua"
        scriptFileName="$USER_DIR/lua/ci_script.lua"

        cat <<EOF > "$scriptFileName"
        local cbOnError = game.add_event_listener("OnLuaError",function(err)
          console.print_messageln("A Lua error has occurred! Shutting down...")
          file.write("ci.txt", "lua")
          file.write("ci_lua_error.txt", err)
          engine.shutdown()
        end)
        EOF

        echo "file.write(\"ci.txt\", \"unknown\")" >> "$scriptFileName"
        if [ "${{ inputs.lua-script }}" != "" ]; then
          cat <<EOF >> "$scriptFileName"
        include("${{ inputs.lua-script }}")
        EOF

        fi
        echo "${{ inputs.lua-code }}" >> "$scriptFileName"
        echo "file.write(\"ci.txt\", \"success\")" >> "$scriptFileName"
        cat "$scriptFileName"

    - name: Runner Setup
      shell: bash
      if: ${{ runner.os == 'Linux' }}
      id: runner-prep
      run: |
        # Set up xvfb to avoid segfault issues when running chromium in CLI mode
        # TODO: It would be better if we could do this within Pragma somehow.
        sudo apt install xvfb
        nohup Xvfb :99 -screen 0 1280x720x24 >/tmp/xvfb.log 2>&1 & echo $! > /tmp/xvfb.pid
        echo "DISPLAY=:99" >> $GITHUB_ENV
        # Wait for Xvfb
        sleep 1

    - name: Run script
      shell: bash
      id: run-script
      run: |
        cd "$WORKING_DIR"
        
        luaCmdName="lua_exec"
        if [ "${{ inputs.state }}" == "client" ]; then
          luaCmdName="lua_exec_cl"
        fi
        
        if [ "$RUNNER_OS" == "Linux" ]; then
          if [ "${{ inputs.format }}" == "appimage" ]; then
            if [ "${{ inputs.version }}" == "nightly" ]; then
              appImageName="PFM-x86_64.AppImage"
            else
              appImageName="PFM-${{ inputs.version }}-x86_64.AppImage"
            fi
            chmod +x "./${appImageName}"
            if [ "${{ inputs.state }}" == "server" ]; then
              executableName="${appImageName} pragma_server"
            else
              executableName="${appImageName} pragma"
            fi
          else
            chmod +x ./pragma
            if [ "${{ inputs.state }}" == "server" ]; then
              executableName="pragma_server"
            else
              executableName="pragma"
            fi
          fi
        elif [ "$RUNNER_OS" == "Windows" ]; then
          if [ "${{ inputs.state }}" == "server" ]; then
            executableName="pragma_server"
          else
            executableName="pragma.com"
          fi
        else
          # Fallback (macOS / others)
          if [ "${{ inputs.state }}" == "server" ]; then
            executableName="pragma_server"
          else
            executableName="pragma"
          fi
        fi
        
        ./${executableName} -cli -non_interactive -luaext -log 0 0 -log_file "log.txt" +map "empty" +"${luaCmdName} ci_script.lua"

        EXIT_CODE=$?
        echo "exit-code=$(echo $EXIT_CODE)" >> $GITHUB_OUTPUT

    - name: Check script execution result
      id: handle-result
      shell: bash
      run: |
        echo "error=success" >> $GITHUB_OUTPUT
        
        exit_code=${{ steps.run-script.outputs.exit-code }}
        echo "exit-code=$exit_code" >> $GITHUB_OUTPUT
    
        if [ $exit_code -ne 0 ]; then
          echo "error=exit" >> $GITHUB_OUTPUT
          exit $exit_code
        fi
    
        # Check for Lua errors in the user directory
        if [ -f "$USER_DIR/ci_lua_error.txt" ]; then
          CI_LUA_ERROR=$(cat "$USER_DIR/ci_lua_error.txt")
          if [ -n "$CI_LUA_ERROR" ]; then
            SANITIZED_LUA_ERROR=$(echo "$CI_LUA_ERROR" | tr -d '\n\r' | sed 's/["]/ /g')
            echo "lua-error=$SANITIZED_LUA_ERROR" >> $GITHUB_OUTPUT
          fi
        fi
    
        if [ ! -f "$USER_DIR/ci.txt" ]; then
          echo "error=ci_file_missing" >> $GITHUB_OUTPUT
          exit 1
        fi
        
        CI_CONTENTS=$(cat "$USER_DIR/ci.txt")
        exit_code=$?
    
        if [ $exit_code -ne 0 ]; then
          echo "error=ci_file" >> $GITHUB_OUTPUT
          exit 1
        fi
        if [ "$CI_CONTENTS" != "success" ]; then
          SANITIZED_CONTENTS=$(echo "$CI_CONTENTS" | tr -d '\n\r' | sed 's/["]/ /g')
          echo "error=$SANITIZED_CONTENTS" >> $GITHUB_OUTPUT
          exit 2
        fi

    - name: Prepare artifact files
      shell: bash
      if: ${{ always() && inputs.artifacts-name != '' }}
      run: |
        mkdir -p artifacts
        if [ -f "$WORKING_DIR/log.txt" ]; then
          cp "$WORKING_DIR/log.txt" artifacts/log.txt
        fi
        if [ -d "$WORKING_DIR/crashdumps" ]; then
          cp -r "$WORKING_DIR/crashdumps" artifacts/crashdumps
        fi
        if [ -d "$WORKING_DIR/artifacts" ] && [ "$(ls -A "$WORKING_DIR/artifacts")" ]; then
          cp -rf "$WORKING_DIR/artifacts/"* artifacts/
        fi

    - name: Upload artifact files
      uses: actions/upload-artifact@v4
      if: ${{ always() && inputs.artifacts-name != '' }}
      with:
        name: ${{ inputs.artifacts-name }}
        path: "artifacts"

    - name: Clean-up
      shell: bash
      run: |
        if [ -d "artifacts" ]; then
          rm -rf "artifacts"
        fi

        if [ -e "$USER_DIR/lua/ci_script.lua" ]; then
          rm "$USER_DIR/lua/ci_script.lua"
        fi
        if [ -e "$USER_DIR/ci.txt" ]; then
          rm "$USER_DIR/ci.txt"
        fi
        if [ -e "$USER_DIR/ci_lua_error.txt" ]; then
          rm "$USER_DIR/ci_lua_error.txt"
        fi

        cd "$WORKING_DIR"
        if [ -e "log.txt" ]; then
          rm "log.txt"
        fi
        if [ -d "crashdumps" ]; then
          rm -rf "crashdumps"
        fi
        if [ -d "artifacts" ]; then
          rm -rf "artifacts"
        fi
